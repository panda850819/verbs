name: release

# Minimal personal-first release: push a v* tag, get a GitHub release with
# generated notes. No preflight pipeline, no custom artifacts — GitHub's
# standard source archives suffice. Prerelease tags (v*-*) publish as
# prerelease and never claim "latest".

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          extra=""
          case "$GITHUB_REF_NAME" in
            *-*) extra="--prerelease --latest=false" ;;
          esac
          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes $extra
