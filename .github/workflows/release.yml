name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing annotated release tag
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  preflight:
    permissions:
      contents: read
    runs-on: macos-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}
      - name: Restore annotated tag object
        run: git fetch --force --no-tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
      - name: Run release preflight
        run: bash scripts/release-preflight.sh --tag "$RELEASE_TAG"
      - name: Upload release metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-metadata
          if-no-files-found: error
          path: |
            dist/release-title.txt
            dist/release-notes.md

  publish:
    needs: preflight
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Download release metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-metadata
          path: dist
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          existing_draft="$(
            gh release view "$RELEASE_TAG" \
              --json isDraft \
              --jq '.isDraft' 2>/dev/null || true
          )"
          case "$existing_draft" in
            "")
              ;;
            true)
              gh release delete "$RELEASE_TAG" --yes
              ;;
            *)
              echo "ERROR: release $RELEASE_TAG already exists and is not a draft" >&2
              exit 1
              ;;
          esac

          release_flags=(--verify-tag --draft)
          case "$RELEASE_TAG" in
            *-*)
              release_flags+=(--prerelease --latest=false)
              ;;
          esac

          gh release create "$RELEASE_TAG" "${release_flags[@]}" \
            --title "$(cat dist/release-title.txt)" \
            --notes-file dist/release-notes.md
          gh release edit "$RELEASE_TAG" --draft=false
