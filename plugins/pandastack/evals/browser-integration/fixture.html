<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Pandastack Browser Eval Fixture</title></head>
<body>
  <h1 id="title">Browser Eval Fixture</h1>
  <p id="counter">Counter: 0</p>
  <button id="inc">Increment</button>
  <form>
    <input id="name" placeholder="your name" />
    <p id="greeting">Hello, stranger</p>
  </form>
  <script>
    document.getElementById('inc').addEventListener('click', function () {
      window.c = (window.c || 0) + 1;
      document.getElementById('counter').textContent = 'Counter: ' + window.c;
    });
    document.getElementById('name').addEventListener('input', function (e) {
      document.getElementById('greeting').textContent = 'Hello, ' + (e.target.value || 'stranger');
    });
  </script>
</body>
</html>
