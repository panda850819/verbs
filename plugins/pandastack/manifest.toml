# pandastack manifest — single source of truth for skill tier + dependencies.
#
# Read by:
#   - scripts/bootstrap.sh   (decides what to install on a fresh clone)
#   - lib/capability-probe.md (decides degraded-mode messaging)
#   - your own /pandastack:init flow (sets up config env vars)
#
# Tier semantics (v2.2):
#   core      — markdown-only. No external CLI required. Runs on a fresh clone after
#               `git clone && /plugin install`. Personas, lifecycle skills, session
#               management.
#   ext       — needs a publicly installable CLI (brew / npm / pipx / curl / gh release).
#               bootstrap.sh prints the install command; user opts in.
#
# v2.2 dropped the personal tier from this manifest. Personal-tier skills (those
# requiring private CLIs like gog / bird / feed-server) live exclusively in the
# personal overlay (now `~/.agents/skills/`). The public package is now self-contained:
# clone + install gives you everything in this manifest.
#
# Requires syntax:
#   cli:<name>          — generic command must be on PATH
#   brew:<formula>      — brew install <formula>
#   brew-tap:<tap/name> — brew install from a tap
#   npm:<pkg>           — npm install -g <pkg>
#   pipx:<pkg>          — pipx install <pkg>
#
# Skills derive vault path from cwd (run from vault root) and auth from CLI defaults.
# No env vars required as of v2.0.1.
#
# This file is hand-curated. When you add or rename a skill, update here.

[manifest]
version = "2.2.0"
schema  = "skill-tier-v1"
updated = "2026-05-09"

# v2.2.0 (2026-05-09): scope tightening. Public package shrinks 38 → 26 skills.
#   - Archived (true cuts): think-like-naval, think-like-alan-chan (mimicry not
#     insight), inbox-triage (brain `find_orphans` replaces), scout (ad-hoc gh +
#     WebFetch suffices), summarize (gbrain ingest paths replace), work-ship
#     (folded into /ship knowledge as decision-note variant).
#   - Deleted (use MCP): notion, slack — Claude.ai Notion/Slack MCP via OAuth
#     replaces local-CLI-with-keychain-token model.
#   - Moved to the personal overlay (~/.agents/skills/): bird, brief-morning, evening-distill,
#     curate-feeds — all required private CLIs that cannot ship in a public
#     package; the overlay is now their canonical home.
#   - Deleted: plugins/pandastack/flows/ (7 .md specs). Lifecycle docs collapse
#     into README "Lifecycle map" section covering 3 flows: dev / writing /
#     knowledge. Other "flows" (research / work / decision / retro) demoted: not
#     first-class flows, just compositions documented per-skill.
#   - PHILOSOPHY shift: "pandastack ships verbs. The brain keeps state.
#     Lifecycle discipline is your job, not the package's."
# v2.1.1: small decoupling pass. brief-morning + evening-distill degrade
# gracefully when `gog` is missing instead of hard-aborting. Hermes-specific
# triggers in skill descriptions + RESOLVER changed to scheduler-agnostic
# wording. CLAUDE.md hardcoded reads in init / checkpoint / qa / review / ship
# now also accept AGENTS.md (Codex parity).
# v2.1.0: cut gbq / gbrain dependency. deep-research removed (gbrain-core skill).
# brief-morning + evening-distill drop gbq vault-focus seed (use file scan instead).
# Sommet skills + work-sommet-abyss-po context removed from the personal overlay.
# v2.0.1: cut env var requirement (PANDASTACK_VAULT / PANDASTACK_USER_EMAIL /
# PANDASTACK_HOME). Skills derive vault from cwd; gog uses default account; persona
# dispatch uses plugin-relative path resolution.
# v2.0.0: cut 7 orphan skills (atomize, architect, execute-plan, think-like-karpathy,
# process-decisions, wiki-lint, retro-prep-week). knowledge-ship + write-ship merged
# into /ship as modes. Aliases keep old names resolving for 90 days.
# v1.4.0: tool-* skills renamed to drop the prefix. tool-pdf -> pdf, tool-bird -> bird,
# etc. 90-day alias grace via SKILL.md frontmatter `aliases:`.

# ============================================================================
# CORE (24) — markdown-only, fresh-clone runnable
# ============================================================================

[skill.boardroom]
tier = "core"
description = "4-voice plan critique (CEO / product / design / eng)."

[skill.careful]
tier = "core"
description = "Confirmation gate before destructive commands."

[skill.ceo]
tier = "core"
description = "Strategic advisor persona — kill / pivot / continue judgment."

[skill.checkpoint]
tier = "core"
description = "Save / resume working state snapshots."

[skill.design-lead]
tier = "core"
description = "Senior designer persona — anti-slop, accessibility-first."

[skill.dojo]
tier = "core"
description = "Pre-action prep, surfaces gotchas before a work session."

[skill.eng-lead]
tier = "core"
description = "Staff engineer persona — minimal diff, root cause."

[skill.freeze]
tier = "core"
description = "Lock editing scope to specific paths for the session."

[skill.gatekeeper]
tier = "core"
description = "Pre-adoption trust check for external skills / MCPs / repos."

[skill.grill]
tier = "core"
description = "Atomic adversarial requirement discovery."

[skill.init]
tier = "core"
description = "One-time pandastack init per project."

[skill.office-hours]
tier = "core"
description = "5-stage flow: load context, grill, premise challenge, alternatives, brief."

[skill.ops-lead]
tier = "core"
description = "COO persona — systems that run without you."

[skill.product-lead]
tier = "core"
description = "VP Product persona — user problems over solutions."

[skill.retro-month]
tier = "core"
description = "Three-phase monthly retro."

[skill.retro-week]
tier = "core"
description = "Three-phase weekly retro: Auto-scan, Interview, Write."

[skill.review]
tier = "core"
requires = ["cli:git"]
description = "Parallel 3-pass review (correctness, security, architecture)."

[skill.ship]
tier = "core"
requires = ["cli:git", "cli:gh"]
description = "Multi-mode ship verb: git (default), knowledge (incl. decision-note variant for work-topic close, replaces v2.1 /work-ship), write. Knowledge / write modes run from vault root."

[skill.handover]
tier = "core"
requires = ["cli:git", "cli:codex"]
description = "Hand unfinished work to Codex to DO (not /ship, which closes finished work): sync (spawn codex exec now) or --async (write payload for Hermes). Codex runs on ChatGPT-subscription quota, conserving the Claude session."

[skill.skill-creator]
tier = "core"
description = "Create new pandastack skills, MECE-checked against RESOLVER, trigger-first evolution."

[skill.sprint]
tier = "core"
description = "1-2h focused execution: dojo, grill-lite, execute, review, ship."

[skill.team-orchestrate]
tier = "core"
requires = ["cli:git"]
description = "N independent branches in parallel git worktrees."

[skill.using-pandastack]
tier = "core"
description = "Cognitive contract loaded at session start."

[skill.write]
tier = "core"
description = "Voice-aware drafting + slop detection."

# ============================================================================
# EXT (2) — public CLI dependencies
# ============================================================================

[skill.qa]
tier = "ext"
requires = ["npm:agent-browser"]
description = "Browser-based UI QA, real pages, real flows."

[skill.deepwiki]
tier = "ext"
requires = ["cli:curl", "cli:jq"]
description = "GitHub repo docs + Mermaid diagrams via deepwiki."

# ============================================================================
# Notes
# ============================================================================
#
# Personal-tier skills (private CLI dependencies) are NOT listed here. They
# live exclusively in the personal overlay (`~/.agents/skills/`):
#   - bird                     (private:bird) — X/Twitter read/write
#   - brief-morning            (private:gog)  — daily 8am briefing
#   - evening-distill          (private:gog)  — daily 10pm distill
#   - curate-feeds             (private:feed-server) — feed pipeline
#   - chain-scout              — on-chain analysis
#   - misalignment             — Slack misalignment scan
#   - yei-alert-triage         — Hypernative + on-chain risk triage
#
# Substrate dependencies (assumed by the harness, not by individual skills):
#   - ~/.agents/AGENTS.md      identity / voice / routing — capability-probe ABORTs without it
#   - claude-code              the CLI runtime (or codex / gemini / hermes equivalent)
#
# When adding a new skill:
#   1. Create plugins/pandastack/skills/<name>/SKILL.md
#   2. Add a [skill.<name>] entry here with tier + requires + config
#   3. If tier=ext, add the install command in scripts/bootstrap.sh ext-install table
#   4. Update RESOLVER.md skill catalog
#
# Skills cut in v2.2.0 (archived under skills/_archive/<name>-<date>/):
#   - think-like-naval, think-like-alan-chan
#   - inbox-triage
#   - scout, summarize
#   - work-ship (folded into /ship knowledge decision-note variant)
