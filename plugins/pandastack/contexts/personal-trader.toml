[context]
name        = "personal:trader"
description = "Crypto/stock research, on-chain analysis, systematic trading signal work"
domain      = "personal"
private     = false  # public base; sensitive on-chain skills attach via private overlay

[persona]
agent         = ""   # no persona
voice_override = ""

[flow]
# v2.2: research is no longer a first-class flow — it's a knowledge variant.
# Trader work composes /grill (scope lock) + ad-hoc fetch (gh / WebFetch / brain query) + /ship knowledge.
main = "knowledge"
side = ["retro"]

[skills]
public = [
  "pandastack:grill",             # adversarial scope lock before research dive
  "pandastack:ship",              # /ship knowledge <path> for verified research notes
  "pandastack:retro-week",
  "pandastack:retro-month",
  "pandastack:done",
]
private = []  # extended by private overlay (bird, chain-scout — tier=personal — load via ~/.agents/contexts/personal-trader.overlay.toml)

[memory]
namespace    = "personal/trader"
firewall_from = ["work/yei/*", "personal/developer", "personal/writer"]

[sources]
vault = "personal-vault"

[mcp]
deny = [
  "mcp__claude_ai_Linear__*",     # work issue tracker — only allowed in work contexts
  "mcp__claude_ai_Atlassian__*",  # work issue tracker — only allowed in work contexts
]

[notes]
# Public base: research + framing skills only. On-chain chip-structure analysis (chain-scout)
# is sensitive position-adjacent logic and is added via the personal overlay in ~/.agents/contexts/.
# Firewall is wider than other personal contexts: trader memory must not bleed into developer or writer sessions either.
