[context]
name        = "personal:developer"
description = "Personal software development work: features, debugging, refactors, side projects"
domain      = "personal"
private     = false

[persona]
agent         = "pandastack:eng"
voice_override = ""

[flow]
main = "dev"
side = ["retro"]

[skills]
public = [
  "pandastack:office-hours",    # structured intake / brief
  "pandastack:grill",           # adversarial requirement discovery
  "pandastack:dojo",            # pre-action prep
  "pandastack:sprint",          # 1-2h focused execution
  "pandastack:careful",         # production / shared infra gate
  "pandastack:qa",              # browser-based UI verification
  "pandastack:review",          # 3-pass + Codex cross-check
  "pandastack:ship",            # commit + push + PR (and /ship knowledge for decision logs)
  "pandastack:checkpoint",      # save/resume working state
  "pandastack:freeze",          # lock editing scope before ship
  "pandastack:deepwiki",        # GitHub repo docs
  "pandastack:retro-week",
  "pandastack:retro-month",
  "pandastack:done",
]
private = []  # personal-tier skills live in the personal overlay at ~/.agents/skills/ (bird, brief-morning, evening-distill, curate-feeds)

[memory]
namespace    = "personal/developer"
firewall_from = ["work/yei/*"]

[sources]
vault = "personal-vault"

[mcp]
deny = [
  "mcp__claude_ai_Linear__*",     # work issue tracker — only allowed in work contexts
  "mcp__claude_ai_Atlassian__*",  # work issue tracker — only allowed in work contexts
]

[notes]
# /office-hours produces a brief in docs/briefs/; /grill is atomic adversarial discovery.
# pandastack:review is the default review; security-review --mode agent handles security-focused passes separately.
# Notion writes (when needed): use Claude.ai Notion MCP via OAuth (the public /notion skill was deleted in v2.2.0).
