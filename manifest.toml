# Verbs manifest — single source of truth for product identity, skill tier,
# and dependencies.
#
# Read by:
#   - scripts/bootstrap.sh   (decides what to install on a fresh clone)
#   - lib/capability-probe.md (decides degraded-mode messaging)
#   - scripts/verbs          (doctor, install hints, generated loader metadata)
#
# Tier semantics:
#   core      — markdown-first. Runs after clone + plugin install; a software
#               operation may still declare the baseline `git` CLI.
#   ext       — needs a publicly installable CLI (brew / npm / pipx / curl / gh release).
#               bootstrap.sh prints the install command; user opts in.
#
# The package is self-contained: clone + install exposes everything declared in
# this manifest. Personal skills and private CLIs are outside this product.
#
# Requires syntax:
#   cli:<name>          — generic command must be on PATH
#   brew:<formula>      — brew install <formula>
#   brew-tap:<tap/name> — brew install from a tap
#   npm:<pkg>           — npm install -g <pkg>
#   pipx:<pkg>          — pipx install <pkg>
#
# This file is hand-curated. When you add or rename a skill, update here.

[product]
id = "verbs"
display_name = "Verbs"
marketplace_id = "verbs"
repository = "panda850819/verbs"
homepage = "https://github.com/panda850819/verbs"
description = "An opinionated skill pack for taking software work from ambiguity to verified delivery."
hero = "Hard-won ways of working, encoded as composable skills for coding agents."
support = "Verified on Claude Code and Codex. Hermes supports selective manual import."
category = "Developer Tools"
archive_prefix = "verbs"
environment_prefix = "VERBS"
keywords = ["agent-skills", "coding-agents", "software-engineering", "review", "ship", "debug"]

[manifest]
version = "0.5.0"
schema  = "skill-tier-v1"
updated = "2026-07-11"

