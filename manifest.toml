# ============================================================================
# CORE (8) — markdown-first, fresh-clone available
# Buckets on disk: engineering / productivity / writing / meta
#
# Git is the baseline software-work CLI, so review / debug stay core with a
# cli:git requirement. A host-native capability such as browser automation does
# not make the pack own a CLI dependency. Skills that directly invoke optional
# external CLIs are ext — see /ship and /handover below.
# ============================================================================

[skill.careful]
tier = "core"
resources = ["lib/verify-the-test-loop.md"]
composes = []
description = "Confirmation gate before destructive commands."

[skill.gatekeeper]
tier = "core"
resources = []
composes = []
description = "Pre-adoption trust check for external skills / MCPs / repos."

[skill.grill]
tier = "core"
resources = ["lib/goal-mapping.md", "lib/push-once.md", "lib/stop-rule.md", "lib/output-templates.md", "lib/skill-decision-tree.md"]
composes = []
description = "Atomic adversarial requirement discovery."

[skill.review]
tier = "core"
requires = ["cli:git"]
resources = ["lib/learning-recall.md", "lib/model-anchors.md"]
composes = []
description = "Risk-adaptive diff review with scoped evidence and cold-context escalation."

[skill.debug]
tier = "core"
requires = ["cli:git"]
resources = ["lib/learning-format.md", "lib/learning-recall.md", "lib/verify-the-test-loop.md"]
composes = []
description = "Systematic root-cause debugging: hypothesis gate, instrument-first by bug class, bisect, scope-blast, known bug classes. NOT diff review (review) or UI taste (ui)."

[skill.sprint]
tier = "core"
resources = ["lib/model-anchors.md", "lib/verify-the-test-loop.md"]
composes = ["debug", "grill", "handover", "review", "ship", "ui"]
description = "Acceptance-driven execution with bounded review and delivery evidence."

[skill.ui]
tier = "core"
resources = []
composes = []
description = "Build/fix UI with a committed point of view. Four override reflexes + craft lore in references (reflex-font blocklist, CJK+Latin type, OKLCH, CSS bans+rewrites, strategic omissions). NOT browser-test (qa) or render-bug debugging (debug)."

[skill.qa]
tier = "core"
resources = ["lib/learning-format.md"]
composes = []
description = "Browser-based UI QA through a host-provided browser automation capability."

# ============================================================================
# EXT (3) — public CLI dependencies
# ============================================================================

[skill.ship]
tier = "ext"
requires = ["cli:git", "cli:gh"]
resources = ["lib/learning-format.md", "lib/trigger-first-skill-evolution.md"]
composes = []
description = "Close completed code work through test, commit, push, and PR. Needs `gh`, hence ext."

[skill.handover]
tier = "ext"
requires = ["cli:git", "cli:codex"]
resources = ["lib/model-anchors.md"]
composes = []
description = "Hand unfinished mechanical work to Codex through a bounded invocation contract: sync (spawn codex exec now) or --async (write an anchored payload). Needs Codex CLI >=0.144.1, hence ext."

[skill.advisor]
tier = "ext"
requires = ["cli:codex", "cli:claude"]
resources = ["lib/gate-contract.md", "lib/model-anchors.md"]
composes = []
description = "Pull a decorrelated second opinion from a DIFFERENT model into the current session (executor-calls-advisor). Zero-config self-locate seat: Claude seat reaches out to codex/GPT, Codex seat to `claude -p`. Default = one cross-model consult on a load-bearing judgment; --panel = blind cross-model critics on a prepared plan. Verified minimums: Codex CLI 0.144.1, Claude Code 2.1.206."

# ============================================================================
# Notes
# ============================================================================
#
# When adding a new skill:
#   1. Create skills/<bucket>/<name>/SKILL.md (bucket = engineering|productivity|writing|meta)
#   2. Add a [skill.<name>] entry here with tier + requires + config
#   3. Run scripts/verbs sync to regenerate every loader manifest
#   4. If tier=ext, add its dependency report to scripts/bootstrap.sh
#   5. Follow maintainer/skill-creator/SKILL.md to write and verify the co-located eval.md
#   6. Update RESOLVER.md skill catalog
