[context]
name        = "personal:writer"
description = "Blog posts, threads, newsletters — capture to draft to publish"
domain      = "personal"
private     = false

[persona]
agent         = ""   # no persona; voice is Panda's own
voice_override = ""

[flow]
main = "writing"
side = ["retro"]

[skills]
public = [
  "pandastack:write",            # voice + slop detection (was: content-write, v1.1 rename)
  "pandastack:ship",             # /ship write <draft> — Close + Extract + Backflow for published pieces
  "pandastack:grill",            # adversarial mode to stress-test thesis before committing
  "pandastack:retro-week",
  "pandastack:retro-month",
  "pandastack:done",
]
private = []  # tier=personal skills (bird / brief-morning / evening-distill / curate-feeds) load via private overlay only

[memory]
namespace    = "personal/writer"
firewall_from = ["work/yei/*"]

[sources]
vault = "personal-vault"
# google_account: configure once via `gog config set default_account` — skills don't override per-call

[mcp]
# Layer 5 firewall: tool-name glob patterns blocked at PreToolUse hook time.
# v0 = denylist only (allow/classifier/JIT deferred; see grill 2026-04-30).
deny = [
  "mcp__claude_ai_Linear__*",     # work issue tracker — only allowed in work contexts
  "mcp__claude_ai_Atlassian__*",  # work issue tracker — only allowed in work contexts
]

[notes]
# grill in adversarial (default) mode is the thesis stress-tester; run before write structure stage to catch weak arguments early.
# /ship write handles the full publish loop including mv to Blog/Published/, reverse-citations, and X-thread draft routing to Inbox/x-drafts/.
# No persona is intentional; write's slop detection is the quality gate, not a persona filter.
